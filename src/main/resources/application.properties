server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/childguard_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

face.engine.url=${FACE_ENGINE_URL:http://localhost:5000/match/batch}
face.engine.required=${FACE_ENGINE_REQUIRED:true}
google.client.id=${GOOGLE_CLIENT_ID:50857678392-41822871u92v2jhgt4q5g6ie9440ltaj.apps.googleusercontent.com}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
geocode.nominatim.base-url=${GEOCODE_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
geocode.user-agent=${GEOCODE_USER_AGENT:ChildGuard/1.0 (contact:admin@childguard.local)}

jwt.secret=${JWT_SECRET:childguard-secret-key-childguard-secret-key-123456}

bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:true}
